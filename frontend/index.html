<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="StudyTube - Curated educational content" />
    <title>StudyTube - Educational Video Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-[#0d0d0d]">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Floating Pomodoro Timer Widget - Simple Version -->
    <div style="position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;">
      <!-- Floating Icon -->
      <button id="pomodoro-float-icon" class="w-14 h-14 bg-[#1a1a1a] border border-[#2a2a2a] rounded-full flex items-center justify-center shadow-lg hover:bg-[#2a2a2a] transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </button>

      <!-- Pomodoro Popup -->
      <div id="pomodoro-popup" class="absolute bottom-16 right-0 w-[320px] bg-[#141414] border border-[#2a2a2a] rounded-2xl shadow-2xl hidden">
        <div class="p-5">
          <!-- Header -->
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold text-white">Pomodoro Timer</h3>
            <button id="close-popup" class="text-secondary hover:text-white">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>

          <!-- Mode Selector -->
          <div class="flex gap-1 mb-5 bg-[#1a1a1a] p-1 rounded-lg">
            <button id="work-mode" class="mode-btn flex-1 px-3 py-2 rounded-md text-xs font-medium bg-primary text-white">
              Work
            </button>
            <button id="short-break-mode" class="mode-btn flex-1 px-3 py-2 rounded-md text-xs font-medium bg-[#1a1a1a] text-secondary hover:bg-[#2a2a2a] hover:text-white">
              Short
            </button>
            <button id="long-break-mode" class="mode-btn flex-1 px-3 py-2 rounded-md text-xs font-medium bg-[#1a1a1a] text-secondary hover:bg-[#2a2a2a] hover:text-white">
              Long
            </button>
          </div>

          <!-- Timer Display -->
          <div class="text-center mb-5">
            <div id="timer-display" class="text-5xl font-bold text-white mb-2 font-mono">25:00</div>
            <div id="adjust-hint" class="text-xs text-secondary">+/- only in Work mode</div>
          </div>

          <!-- Time Adjustment -->
          <div class="flex items-center justify-center gap-3 mb-5">
            <button id="decrease-time" class="w-10 h-10 bg-[#1a1a1a] border border-[#2a2a2a] rounded-lg text-primary hover:bg-[#2a2a2a] hover:text-white text-xl font-bold disabled:opacity-50 disabled:cursor-not-allowed">
              -
            </button>
            <span id="minutes-display" class="text-lg text-white w-12 text-center">25</span>
            <button id="increase-time" class="w-10 h-10 bg-[#1a1a1a] border border-[#2a2a2a] rounded-lg text-primary hover:bg-[#2a2a2a] hover:text-white text-xl font-bold disabled:opacity-50 disabled:cursor-not-allowed">
              +
            </button>
          </div>

          <!-- Control Buttons -->
          <div class="flex gap-2">
            <button id="start-timer" class="flex-1 px-4 py-2.5 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary-hover">
              Start
            </button>
            <button id="pause-timer" class="flex-1 px-4 py-2.5 bg-[#1a1a1a] border border-[#2a2a2a] text-secondary rounded-lg text-sm font-medium hover:bg-[#2a2a2a] hover:text-white">
              Pause
            </button>
            <button id="reset-timer" class="flex-1 px-4 py-2.5 bg-[#1a1a1a] border border-[#2a2a2a] text-secondary rounded-lg text-sm font-medium hover:bg-[#2a2a2a] hover:text-white">
              Reset
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Pomodoro Timer JavaScript - Simple Version -->
    <script>
      // Simple Pomodoro Timer - No animations
      (function() {
        // Wait for React to load
        setTimeout(function() {
          // DOM Elements
          const floatIcon = document.getElementById('pomodoro-float-icon');
          const popup = document.getElementById('pomodoro-popup');
          const closeBtn = document.getElementById('close-popup');
          
          const timerDisplay = document.getElementById('timer-display');
          const minutesDisplay = document.getElementById('minutes-display');
          const adjustHint = document.getElementById('adjust-hint');
          
          const startBtn = document.getElementById('start-timer');
          const pauseBtn = document.getElementById('pause-timer');
          const resetBtn = document.getElementById('reset-timer');
          const increaseBtn = document.getElementById('increase-time');
          const decreaseBtn = document.getElementById('decrease-time');
          
          const workBtn = document.getElementById('work-mode');
          const shortBreakBtn = document.getElementById('short-break-mode');
          const longBreakBtn = document.getElementById('long-break-mode');
          const modeBtns = document.querySelectorAll('.mode-btn');

          // Exit if elements don't exist
          if (!floatIcon || !popup) return;

          // Timer settings
          const WORK_TIME = 25;
          const SHORT_BREAK_TIME = 5;
          const LONG_BREAK_TIME = 15;

          // Timer state
          let timeLeft = WORK_TIME * 60;
          let timerInterval = null;
          let isRunning = false;
          let currentMode = 'work';
          let currentMinutes = WORK_TIME;

          // Update display
          function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            if (timerDisplay) {
              timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
            if (minutesDisplay) {
              minutesDisplay.textContent = minutes;
            }
          }

          // Stop timer
          function stopTimer() {
            if (timerInterval) {
              clearInterval(timerInterval);
              timerInterval = null;
            }
            isRunning = false;
          }

          // Start timer
          function startTimer() {
            if (isRunning) return;
            
            isRunning = true;
            timerInterval = setInterval(() => {
              if (timeLeft <= 0) {
                stopTimer();
                alert(`⏰ Timer finished!`);
                
                // Auto switch mode
                if (currentMode === 'work') {
                  setMode('shortBreak');
                } else {
                  setMode('work');
                }
              } else {
                timeLeft--;
                updateDisplay();
              }
            }, 1000);
          }

          // Update adjustment buttons state
          function updateAdjustButtons() {
            if (!increaseBtn || !decreaseBtn || !adjustHint) return;
            
            const isWorkMode = currentMode === 'work';
            increaseBtn.disabled = !isWorkMode;
            decreaseBtn.disabled = !isWorkMode;
            
            adjustHint.textContent = isWorkMode ? '+/- to adjust by 10 min' : '+/- only in Work mode';
          }

          // Set mode
          function setMode(mode) {
            stopTimer();
            
            // Update button styles
            modeBtns.forEach(btn => {
              btn?.classList.remove('bg-primary', 'text-white');
              btn?.classList.add('bg-[#1a1a1a]', 'text-secondary');
            });
            
            currentMode = mode;
            
            switch(mode) {
              case 'work':
                workBtn?.classList.remove('bg-[#1a1a1a]', 'text-secondary');
                workBtn?.classList.add('bg-primary', 'text-white');
                timeLeft = WORK_TIME * 60;
                currentMinutes = WORK_TIME;
                break;
              case 'shortBreak':
                shortBreakBtn?.classList.remove('bg-[#1a1a1a]', 'text-secondary');
                shortBreakBtn?.classList.add('bg-primary', 'text-white');
                timeLeft = SHORT_BREAK_TIME * 60;
                currentMinutes = SHORT_BREAK_TIME;
                break;
              case 'longBreak':
                longBreakBtn?.classList.remove('bg-[#1a1a1a]', 'text-secondary');
                longBreakBtn?.classList.add('bg-primary', 'text-white');
                timeLeft = LONG_BREAK_TIME * 60;
                currentMinutes = LONG_BREAK_TIME;
                break;
            }
            
            updateDisplay();
            updateAdjustButtons();
          }

          // Reset timer
          function resetTimer() {
            stopTimer();
            setMode(currentMode);
          }

          // Increase time
          function increaseTime() {
            if (isRunning || currentMode !== 'work') return;
            currentMinutes += 10;
            timeLeft = currentMinutes * 60;
            updateDisplay();
          }

          // Decrease time
          function decreaseTime() {
            if (isRunning || currentMode !== 'work') return;
            if (currentMinutes > 10) {
              currentMinutes -= 10;
            } else {
              currentMinutes = 1;
            }
            timeLeft = currentMinutes * 60;
            updateDisplay();
          }

          // Toggle popup
          function togglePopup() {
            if (popup) {
              popup.classList.toggle('hidden');
            }
          }

          // Close popup when clicking outside
          document.addEventListener('click', function(event) {
            if (popup && floatIcon && !popup.classList.contains('hidden') && 
                !popup.contains(event.target) && 
                !floatIcon.contains(event.target)) {
              popup.classList.add('hidden');
            }
          });

          // Event listeners
          if (floatIcon) floatIcon.addEventListener('click', togglePopup);
          if (closeBtn) closeBtn.addEventListener('click', () => popup?.classList.add('hidden'));
          
          if (startBtn) startBtn.addEventListener('click', startTimer);
          if (pauseBtn) pauseBtn.addEventListener('click', stopTimer);
          if (resetBtn) resetBtn.addEventListener('click', resetTimer);
          if (increaseBtn) increaseBtn.addEventListener('click', increaseTime);
          if (decreaseBtn) decreaseBtn.addEventListener('click', decreaseTime);
          
          if (workBtn) workBtn.addEventListener('click', () => setMode('work'));
          if (shortBreakBtn) shortBreakBtn.addEventListener('click', () => setMode('shortBreak'));
          if (longBreakBtn) longBreakBtn.addEventListener('click', () => setMode('longBreak'));

          // Initialize
          updateDisplay();
          updateAdjustButtons();
        }, 100); // Small delay to let React load
      })();
    </script>
  </body>
</html>
